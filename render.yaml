services:
  - type: web
    name: driver-fleet-lease-crm
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: fleetwebco
      - key: APP_ACCESS_USER
        sync: false
      - key: APP_ACCESS_PASSWORD
        sync: false
      - key: PAYMENT_MODE
        value: test
      - key: BOOKING_DEPOSIT_AMOUNT
        value: 100
      - key: BOOKING_HOLD_MINUTES
        value: 30
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

